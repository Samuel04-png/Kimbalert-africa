name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for build and deploy
        run: |
          cat << EOF > .env
          VITE_AI_INSIGHTS_ENABLED="true"
          VITE_AI_MODE="insights"
          VITE_AI_ALLOW_CLIENT_DEEPSEEK="false"
          VITE_AI_USE_FIREBASE_FUNCTIONS="true"
          VITE_AI_FIREBASE_FUNCTION_NAME="incidentSummary"
          VITE_ADMIN_OPS_USE_FIREBASE_FUNCTIONS="true"
          VITE_ADMIN_OPS_FUNCTION_NAME="adminOperation"
          VITE_DEFAULT_COUNTRY="ZA"
          VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaSyD4bDkUVKQcHxscU0KIKRgZfElJEAOSrzI' }}"
          VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'kimbalert-africa.firebaseapp.com' }}"
          VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID || 'kimbalert-africa' }}"
          VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'kimbalert-africa.firebasestorage.app' }}"
          VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '104705881525' }}"
          VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID || '1:104705881525:web:0b0601bf946ccd204e55fc' }}"
          VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || 'G-MC82BPFW78' }}"
          VITE_FIREBASE_FUNCTIONS_REGION="${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION || 'africa-south1' }}"
          VITE_FIREBASE_SEED_ON_EMPTY="false"
          VITE_DEEPSEEK_BASE_URL="https://api.deepseek.com"
          VITE_DEEPSEEK_MODEL="deepseek-chat"
          VITE_DEEPSEEK_API_KEY="${{ secrets.VITE_DEEPSEEK_API_KEY }}"
          AI_PROXY_PORT="8787"
          APP_ORIGIN="https://kimbalert.byteandberry.com"
          DEEPSEEK_BASE_URL="https://api.deepseek.com"
          DEEPSEEK_MODEL="deepseek-chat"
          DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
          FUNCTIONS_REGION="africa-south1"
          TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}"
          TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}"
          TWILIO_MESSAGING_SERVICE_SID="${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}"
          EOF

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Backend
        run: firebase deploy --only functions,firestore,storage --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Firebase deploy failed. Please ensure FIREBASE_TOKEN secret is set correctly."
